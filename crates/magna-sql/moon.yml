$schema: 'https://moonrepo.dev/schemas/project.json'

type: 'library'
language: 'rust'

tasks:
  build:
    command: 'cargo build -p magna-sql'
    inputs: ['src/**/*.rs', 'Cargo.toml']

  test:
    command: 'cargo test -p magna-sql'
    inputs: ['src/**/*.rs', 'Cargo.toml']
    deps:
      - '~:build'
