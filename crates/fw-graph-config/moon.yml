$schema: 'https://moonrepo.dev/schemas/project.json'

type: 'library'
language: 'rust'

dependsOn:
  - 'fw-graph-types'

tasks:
  build:
    command: 'cargo build -p fw-graph-config'
    inputs: ['src/**/*.rs', 'Cargo.toml']
    deps:
      - 'fw-graph-types:build'

  test:
    command: 'cargo test -p fw-graph-config'
    inputs: ['src/**/*.rs', 'Cargo.toml']
    deps:
      - '~:build'
