name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
      - name: cargo test --workspace
        run: cargo test --workspace --all-targets

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

  publish-dry-run:
    name: cargo publish --dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Verify each crate publishes cleanly (dry-run)
        run: |
          for crate in magna-types magna-core magna-sql magna-introspect magna-dataplan magna-config magna-build magna-serv magna-subscriptions magna-remote magna; do
            echo "::group::publish dry-run $crate"
            cargo publish --dry-run -p "$crate" --allow-dirty || echo "::warning::$crate dry-run failed (expected during 0.x with internal path deps; revisit at v1.0)"
            echo "::endgroup::"
          done
